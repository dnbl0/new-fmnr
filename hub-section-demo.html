<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hub Section Demo — FMNR Components</title>
    <link rel="stylesheet" href="https://use.typekit.net/ajf0nww.css">
    <link href="design-tokens.css" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--font-body);background:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px}
        .demo-frame{width:100%;max-width:1280px;border-radius:12px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.15);background:#f5f5f7}

        .hub-inner{max-width:1280px;margin:0 auto;padding:0 48px;display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:center}
        .hub-media{overflow:hidden;border-radius:8px;margin:80px 0}
        .hub-media img{width:100%;height:520px;object-fit:cover;display:block;border-radius:8px}
        .hub-content{display:flex;flex-direction:column;gap:24px}
        .hub-content .eyebrow{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.18em;color:var(--color-green)}
        .hub-content h2{font-family:var(--font-heading);font-size:clamp(30px,3.8vw,52px);text-transform:uppercase;line-height:1}
        .hub-content h2 em{color:var(--color-green);font-style:normal}
        .hub-content>p{font-size:17px;line-height:1.7;color:rgba(0,0,0,.52)}
        .hub-items{display:flex;flex-direction:column}
        .hub-item{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid #ddd;text-decoration:none;color:#1d1d1f;font-weight:700;font-size:15px;transition:color .2s}
        .hub-item:first-child{border-top:1px solid #ddd}
        .hub-item:hover{color:var(--color-green)}
        .hub-item svg{width:16px;height:16px;opacity:.25}
        @media(max-width:900px){.hub-inner{grid-template-columns:1fr;gap:40px;padding:0 24px}.hub-media{margin:56px 0 0}.hub-media img{height:300px}}
    </style>
</head>
<body>
<style id="demo-toolbar-style">
body{padding-top:44px !important;} .site-header{top:44px !important;}
#demo-toolbar{position:fixed;top:0;left:0;right:0;z-index:9999;height:44px;background:#0a0a0a;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;padding:0 20px;gap:0;font-family:'Lato',sans-serif;font-size:12px;box-sizing:border-box;}
#demo-toolbar a{text-decoration:none;}
.dtb-back{color:#0FFBAB;font-weight:700;white-space:nowrap;letter-spacing:.04em;flex-shrink:0;}
.dtb-back:hover{opacity:.7;}
.dtb-title{color:rgba(255,255,255,.45);flex:1;text-align:center;font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 16px;}
.dtb-nav{display:flex;gap:16px;flex-shrink:0;}
.dtb-prev,.dtb-next{color:rgba(255,255,255,.35);font-size:12px;white-space:nowrap;}
.dtb-prev:hover,.dtb-next:hover{color:#fff;}
.dtb-disabled{color:rgba(255,255,255,.12);pointer-events:none;font-size:12px;}
</style>
<div id="demo-toolbar">
  <a class="dtb-back" href="components.html">← Components</a>
  <span class="dtb-title">Hub Section</span>
  <nav class="dtb-nav"><a class="dtb-prev" href="heading-demo.html">← Heading</a><a class="dtb-next" href="icon-demo.html">Icon →</a></nav>
</div>
    <div class="demo-frame">
        <div class="hub-inner">
            <div class="hub-media">
                <img src="images/brand/WVA5019_WVA-FMNR-Playbook_Master_R4a_Page_09_Image_0002.jpg" alt="FMNR farmer">
            </div>
            <div class="hub-content">
                <span class="eyebrow">FMNR Hub</span>
                <h2>Your learning hub<br>for <em>FMNR</em></h2>
                <p>Everything you need to understand, adopt and scale Farmer Managed Natural Regeneration &#8212; from introductory guides to peer-reviewed research.</p>
                <div class="hub-items">
                    <a href="#" class="hub-item">
                        <span>Learning Modules</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </a>
                    <a href="#" class="hub-item">
                        <span>Research Papers</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </a>
                    <a href="#" class="hub-item">
                        <span>Video Library</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </a>
                    <a href="#" class="hub-item">
                        <span>Community Tools</span>
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </a>
                </div>
            </div>
        </div>
    </div>
<script src="shared-header.js"></script>
</body>
</html>
