<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Editorial Band Demo — FMNR Components</title>
    <link rel="stylesheet" href="https://use.typekit.net/ajf0nww.css">
    <link href="design-tokens.css" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--font-body);background:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px}
        .demo-frame{width:100%;max-width:1280px;border-radius:12px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.15)}

        .editorial-band{position:relative;height:78vh;min-height:480px;overflow:hidden}
        .editorial-band img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center 30%}
        .eb-scrim{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.78) 0%,rgba(0,0,0,.15) 55%,transparent 100%)}
        .eb-copy{position:absolute;bottom:72px;left:0;right:0}
        .eb-copy-inner{max-width:1280px;margin:0 auto;padding:0 48px}
        .eb-eyebrow{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.2em;color:rgba(255,255,255,.52);margin-bottom:14px}
        .eb-stat{font-family:var(--font-heading);font-size:clamp(48px,6.5vw,90px);text-transform:uppercase;color:#fff;line-height:.9;margin-bottom:18px;letter-spacing:-.02em;max-width:680px}
        .eb-stat em{color:var(--color-teal);font-style:normal}
        .eb-sub{font-size:16px;color:rgba(255,255,255,.58);line-height:1.6;max-width:480px}
    </style>
</head>
<body>
    <div class="demo-frame">
        <div class="editorial-band">
            <img src="images/brand/WVA5019_WVA-FMNR-Playbook_Master_R4a_Page_08_Image_0001.jpg" alt="FMNR global movement">
            <div class="eb-scrim"></div>
            <div class="eb-copy">
                <div class="eb-copy-inner">
                    <span class="eb-eyebrow">A global movement</span>
                    <p class="eb-stat">27 countries.<br><em>One technique.</em></p>
                    <p class="eb-sub">From a single field in Niger, FMNR has spread to Asia, the Pacific and Latin America &#8212; driven entirely by farmers sharing what works.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
