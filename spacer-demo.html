<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spacer — FMNR Components</title>
    <link rel="stylesheet" href="https://use.typekit.net/ajf0nww.css">
    <link href="design-tokens.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-body); background: var(--color-white); min-height: 100vh; padding: 80px 48px; }
        .block-label { display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--color-green); background: rgba(7,125,87,0.08); padding: 5px 12px; border-radius: 6px; margin-bottom: 24px; }
        .block-title { font-family: var(--font-heading); font-size: 28px; text-transform: uppercase; color: var(--color-text-primary); margin-bottom: 8px; line-height: 1.1; }
        .block-desc { font-size: 15px; color: var(--color-text-secondary); line-height: 1.6; margin-bottom: 48px; max-width: 600px; }
        .demo-area { background: var(--color-bg-light); border-radius: 16px; padding: 48px; max-width: 900px; }
        .variant-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-text-muted); margin-bottom: 16px; display: block; }
        .demo-spacers { display: flex; flex-direction: column; gap: 0; }
        .spacer-row { display: flex; align-items: center; gap: 16px; }
        .spacer-block { background: rgba(7,125,87,0.1); border: 1px dashed var(--color-green); border-radius: 4px; width: 100%; }
        .spacer-label { font-size: 11px; color: var(--color-text-muted); width: 100px; flex-shrink: 0; font-weight: 700; }
        .spacer-row + .spacer-row { margin-top: 16px; }
        @media (max-width: 768px) { body { padding: 48px 24px; } .demo-area { padding: 32px 24px; } }
    </style>
</head>
<body>
    <span class="block-label">Core Block</span>
    <h2 class="block-title">Spacer</h2>
    <p class="block-desc">Token-based vertical spacing (--space-sm through --space-xl).</p>
    <div class="demo-area">
        <div class="demo-spacers">
            <div class="spacer-row">
                <span class="spacer-label">--space-xs (8px)</span>
                <div class="spacer-block" style="height:8px;"></div>
            </div>
            <div class="spacer-row">
                <span class="spacer-label">--space-sm (16px)</span>
                <div class="spacer-block" style="height:16px;"></div>
            </div>
            <div class="spacer-row">
                <span class="spacer-label">--space-md (32px)</span>
                <div class="spacer-block" style="height:32px;"></div>
            </div>
            <div class="spacer-row">
                <span class="spacer-label">--space-lg (64px)</span>
                <div class="spacer-block" style="height:64px;"></div>
            </div>
            <div class="spacer-row">
                <span class="spacer-label">--space-xl (96px)</span>
                <div class="spacer-block" style="height:96px;"></div>
            </div>
        </div>
    </div>
</body>
</html>
