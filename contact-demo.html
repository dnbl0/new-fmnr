<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Contact — FMNR</title>
    <link rel="stylesheet" href="https://use.typekit.net/ajf0nww.css">
    <link href="design-tokens.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-body); color: var(--wp--preset--color--contrast); background: var(--wp--preset--color--base); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 48px 24px; }
        .contact-inner { max-width: 960px; width: 100%; margin: 0 auto; }
        .section-intro { text-align: center; margin-bottom: 48px; }
        .section-intro .eyebrow { font-family: var(--font-body); font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-green); margin-bottom: 12px; }
        .section-intro h2 { font-family: var(--font-heading); font-size: clamp(36px, 4.5vw, 56px); text-transform: uppercase; color: var(--wp--preset--color--contrast); line-height: 1; margin-bottom: 16px; }
        .section-intro p { font-family: var(--font-body); font-size: 17px; line-height: 1.55; color: rgba(0,0,0,0.5); max-width: 480px; margin: 0 auto; }
        .contact-form-wrap { background: var(--wp--preset--color--white); border-radius: 24px; padding: 56px; box-shadow: 0 2px 24px rgba(0,0,0,0.06); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .form-group label { font-family: var(--font-body); font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: rgba(0,0,0,0.4); }
        .form-group input, .form-group select, .form-group textarea { background: var(--wp--preset--color--base); border: 1.5px solid transparent; border-radius: 10px; padding: 14px 16px; font-family: var(--font-body); font-size: 16px; color: var(--wp--preset--color--contrast); outline: none; transition: border-color 0.2s, background 0.2s; width: 100%; }
        .form-group input::placeholder, .form-group textarea::placeholder { color: rgba(0,0,0,0.25); }
        .form-group select { appearance: none; cursor: pointer; }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color: var(--color-green); background: var(--wp--preset--color--white); }
        .form-group textarea { resize: none; min-height: 120px; }
        .form-footer { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-top: 8px; }
        .form-note { font-family: var(--font-body); font-size: 13px; color: rgba(0,0,0,0.35); }
        .btn-submit { background: var(--color-green); color: var(--wp--preset--color--white); font-family: var(--font-body); font-weight: 700; font-size: 16px; padding: 14px 36px; border-radius: 980px; border: none; cursor: pointer; transition: background 0.2s; }
        .btn-submit:hover { background: var(--wp--preset--color--custom-dark-green-fmnr); }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } .contact-form-wrap { padding: 32px 24px; } }
    </style>
</head>
<body>
    <div class="contact-inner">
        <div class="section-intro">
            <p class="eyebrow">Get in touch</p>
            <h2>Let's start<br>a conversation.</h2>
            <p>Tell us about your organisation and the communities you work with. We'll respond within two business days.</p>
        </div>
        <div class="contact-form-wrap">
            <div class="form-row">
                <div class="form-group"><label>First name</label><input type="text" placeholder="Jane"></div>
                <div class="form-group"><label>Last name</label><input type="text" placeholder="Smith"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label>Organisation</label><input type="text" placeholder="Your organisation name"></div>
                <div class="form-group"><label>Email</label><input type="email" placeholder="jane@organisation.org"></div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Partner type</label>
                    <select><option value="" disabled selected>Select your organisation type</option><option>Faith-based organisation</option><option>NGO / Development organisation</option><option>Government / Bilateral donor</option><option>Research / Academic institution</option><option>Corporate / Private sector</option><option>Community organisation</option><option>Other</option></select>
                </div>
                <div class="form-group"><label>Countries or regions</label><input type="text" placeholder="e.g. East Africa, Indonesia"></div>
            </div>
            <div class="form-group"><label>Tell us about your work</label><textarea placeholder="Briefly describe your organisation and what you're hoping to achieve through a partnership with FMNR."></textarea></div>
            <div class="form-footer">
                <p class="form-note">We'll respond within 2 business days. No commitment required.</p>
                <button class="btn-submit" type="submit">Send enquiry →</button>
            </div>
        </div>
    </div>
</body>
</html>
