<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Search — FMNR</title>
    <link rel="stylesheet" href="https://use.typekit.net/ajf0nww.css">
    <link href="design-tokens.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-body); color: var(--wp--preset--color--contrast); background: var(--wp--preset--color--white); overflow-x: hidden; }

        /* ── Header ── */
        .site-header { background: var(--wp--preset--color--white); display: flex; align-items: center; justify-content: space-between; padding: 16px 48px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid rgba(0,0,0,0.08); }
        .logo img { height: 33px; display: block; }
        .nav-links { display: flex; align-items: center; gap: 4px; }
        .nav-links a { font-family: var(--font-body); font-weight: 700; font-size: 14px; color: var(--color-charcoal); text-decoration: none; padding: 8px 12px; transition: color 0.2s; }
        .nav-links a:hover { color: var(--color-green); }
        .header-actions { display: flex; align-items: center; gap: 16px; }
        .header-search-btn { background: transparent; border: none; padding: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; border-radius: 8px; transition: background 0.15s; }
        .header-search-btn:hover { background: var(--wp--preset--color--base); }
        .header-search-btn svg { width: 20px; height: 20px; color: var(--color-charcoal); }
        .header-search-btn.active svg { color: var(--color-green); }
        .btn-donate { background: var(--color-green); color: var(--wp--preset--color--white); font-family: var(--font-body); font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 0.04em; padding: 10px 20px; border-radius: 980px; text-decoration: none; transition: background 0.2s; }
        .btn-donate:hover { background: var(--wp--preset--color--custom-dark-green-fmnr); }

        /* ── Search panel (dropdown) ── */
        .search-panel { position: absolute; top: 100%; left: 0; right: 0; background: var(--wp--preset--color--white); box-shadow: 0 16px 48px rgba(0,0,0,0.1); border-top: 1px solid rgba(0,0,0,0.06); z-index: 999; max-height: 0; overflow: hidden; opacity: 0; transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.3s; }
        .search-panel.open { max-height: 600px; opacity: 1; overflow: visible; }
        .search-panel-inner { max-width: 720px; margin: 0 auto; padding: 24px 48px 32px; }

        /* Search input */
        .search-box { display: flex; align-items: center; gap: 12px; border: 2px solid #0071e3; border-radius: 980px; padding: 14px 20px; background: var(--wp--preset--color--white); }
        .search-box svg { width: 20px; height: 20px; color: var(--wp--preset--color--contrast-3); flex-shrink: 0; }
        .search-box input { flex: 1; border: none; outline: none; font-family: var(--font-body); font-size: 16px; color: var(--wp--preset--color--contrast); background: transparent; }
        .search-box input::placeholder { color: var(--wp--preset--color--contrast-3); }
        .search-box .clear-btn { width: 22px; height: 22px; border-radius: 50%; background: #86868b; border: none; display: none; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
        .search-box .clear-btn.visible { display: flex; }
        .search-box .clear-btn svg { width: 10px; height: 10px; color: var(--wp--preset--color--white); }

        /* Dropdown suggestions */
        .search-dropdown { margin-top: 20px; }
        .search-dropdown-label { font-size: 13px; font-weight: 400; color: var(--wp--preset--color--contrast-3); margin-bottom: 4px; padding: 0 4px; display: flex; align-items: center; justify-content: space-between; }
        .search-dropdown-label a { font-size: 13px; color: var(--wp--preset--color--contrast-3); text-decoration: underline; cursor: pointer; }
        .search-list { list-style: none; }
        .search-list li { border-bottom: 1px solid #f5f5f7; }
        .search-list li:last-child { border-bottom: none; }
        .search-list li a { display: flex; align-items: center; gap: 14px; padding: 14px 4px; text-decoration: none; color: var(--wp--preset--color--contrast); font-size: 15px; font-weight: 700; transition: background 0.1s; border-radius: 6px; }
        .search-list li a:hover { background: var(--wp--preset--color--base); }
        .search-list li a svg { width: 18px; height: 18px; color: var(--wp--preset--color--contrast-3); flex-shrink: 0; }
        .search-list li a .page-icon { color: var(--color-green); }

        /* Predictive results in dropdown */
        .predict-item { display: flex; align-items: center; gap: 14px; padding: 14px 4px; border-bottom: 1px solid #f5f5f7; cursor: pointer; border-radius: 6px; transition: background 0.1s; }
        .predict-item:hover { background: var(--wp--preset--color--base); }
        .predict-item:last-child { border-bottom: none; }
        .predict-item svg { width: 18px; height: 18px; color: var(--wp--preset--color--contrast-3); flex-shrink: 0; }
        .predict-item span { font-size: 15px; font-weight: 700; color: var(--wp--preset--color--contrast); }
        .predict-item .predict-cat { font-weight: 400; color: var(--wp--preset--color--contrast-3); margin-left: auto; font-size: 13px; }

        /* ── Backdrop ── */
        .search-backdrop { position: fixed; inset: 0; top: 65px; background: rgba(0,0,0,0); pointer-events: none; z-index: 998; transition: background 0.3s; }
        .search-backdrop.open { background: rgba(0,0,0,0.25); pointer-events: auto; }

        /* ── Results page (shown after enter) ── */
        .results-page { display: none; }
        .results-page.active { display: block; }
        .results-area { max-width: 840px; margin: 0 auto; padding: 32px 48px; }
        .results-tabs { display: flex; gap: 0; border-bottom: 1px solid #d2d2d7; margin-bottom: 8px; }
        .results-tabs button { font-family: var(--font-body); font-size: 14px; font-weight: 400; color: var(--wp--preset--color--contrast-3); background: none; border: none; padding: 12px 20px; cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; }
        .results-tabs button:hover { color: var(--wp--preset--color--contrast); }
        .results-tabs button.active { color: var(--wp--preset--color--contrast); font-weight: 700; border-bottom-color: var(--wp--preset--color--contrast); }
        .results-count { font-size: 13px; color: var(--wp--preset--color--contrast-3); padding: 16px 0 0; }
        .result-item { display: grid; grid-template-columns: 80px 1fr; gap: 20px; align-items: start; padding: 28px 0; border-bottom: 1px solid #e8e8e8; }
        .result-item:last-child { border-bottom: none; }
        .result-thumb { width: 80px; height: 80px; border-radius: 10px; background: var(--wp--preset--color--base); overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .result-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .result-thumb svg { width: 28px; height: 28px; color: #c7c7cc; }
        .result-body h3 { font-size: 17px; font-weight: 700; color: var(--wp--preset--color--contrast); margin-bottom: 6px; line-height: 1.3; }
        .result-body p { font-size: 14px; line-height: 1.5; color: var(--wp--preset--color--contrast-2); margin-bottom: 12px; }
        .result-links { display: flex; gap: 20px; }
        .result-links a { font-size: 14px; color: #0071e3; text-decoration: none; }
        .result-links a:hover { text-decoration: underline; }
        .result-links a::after { content: ' ›'; }
        .no-results { text-align: center; padding: 80px 0; }
        .no-results h3 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .no-results p { font-size: 15px; color: var(--wp--preset--color--contrast-3); }

        /* ── Hero placeholder (behind search) ── */
        .page-hero { height: 60vh; min-height: 400px; background: var(--wp--preset--color--white); display: flex; align-items: center; justify-content: center; text-align: center; padding: 48px; }
        .page-hero h1 { font-family: var(--font-heading); font-size: clamp(36px, 5vw, 64px); text-transform: uppercase; color: var(--wp--preset--color--contrast); line-height: 1; opacity: 0.15; }

        /* ── Popular pages chips ── */
        .popular-chips { display: flex; flex-wrap: wrap; gap: 8px; list-style: none; padding: 0; margin: 0; }
        .popular-chips a { display: inline-block; padding: 8px 16px; border-radius: 980px; border: 1px solid rgba(0,0,0,0.1); background: var(--wp--preset--color--base); font-size: 14px; font-weight: 600; color: var(--wp--preset--color--contrast); text-decoration: none; transition: background 0.2s; }
        .popular-chips a:hover { background: #e8e8ed; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .site-header { padding: 12px 16px; }
            .nav-links { display: none; }
            .search-panel-inner { padding: 20px 16px 28px; }
            .results-area { padding: 24px 16px; }
            .result-item { grid-template-columns: 1fr; }
            .result-thumb { display: none; }
            .popular-chips { flex-direction: column; }
            .popular-chips a { text-align: center; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="site-header" id="site-header">
        <a href="index.html" class="logo"><img src="fmnr-logo-figma.png" alt="FMNR"></a>
        <nav class="nav-links">
            <a href="partner.html">Partner</a>
            <a href="#">Adopt</a>
            <a href="impact.html">Impact</a>
            <a href="#">Fund</a>
            <a href="tony-rinaudo.html">About</a>
            <a href="resources.html">Resources</a>
        </nav>
        <div class="header-actions">
            <button class="header-search-btn" id="search-toggle" aria-label="Search">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M16 16l5 5"/></svg>
            </button>
            <a href="index.html#contact" class="btn-donate">Get in touch</a>
        </div>

        <!-- Search dropdown panel -->
        <div class="search-panel" id="search-panel">
            <div class="search-panel-inner">
                <form class="search-box" id="search-form" autocomplete="off">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                    <input type="text" id="search-input" placeholder="What are you looking for?" autofocus>
                    <button type="button" class="clear-btn" id="clear-btn" aria-label="Clear">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    </button>
                </form>
                <div class="search-dropdown" id="search-dropdown"></div>
            </div>
        </div>
    </header>

    <!-- Backdrop -->
    <div class="search-backdrop" id="search-backdrop"></div>

    <!-- Main content (hero placeholder, shown before search results) -->
    <main id="main-content">
        <div class="page-hero">
            <h1>Click the search icon<br>to begin</h1>
        </div>
    </main>

    <!-- Results page (shown after pressing enter) -->
    <div class="results-page" id="results-page">
        <div class="results-area">
            <div class="results-tabs" id="results-tabs">
                <button class="active" data-tab="all">Explore</button>
                <button data-tab="resources">Resources</button>
                <button data-tab="impact">Impact</button>
                <button data-tab="regions">Regions</button>
                <button data-tab="partners">Partners</button>
            </div>
            <p class="results-count" id="results-count"></p>
            <div id="results-list"></div>
        </div>
    </div>

    <script>
    (function() {
        var searchIndex = [
            { title:'What is FMNR?', cat:'About', tab:'all', url:'index.html', desc:'Farmer Managed Natural Regeneration is a low-cost, sustainable land restoration technique that regenerates trees from existing root systems.', links:[{l:'Explore',h:'index.html'},{l:'Learn more',h:'resources.html'}], img:'https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=200&q=70&fit=crop' },
            { title:'Partner With Us', cat:'Partners', tab:'partners', url:'partner.html', desc:'For organisations ready to make large-scale impact through FMNR partnerships across faith, NGO, corporate, and government sectors.', links:[{l:'Explore',h:'partner.html'},{l:'Contact',h:'partner.html#contact'}], img:'https://images.unsplash.com/photo-1559027615-cd4628902d4a?w=200&q=70&fit=crop' },
            { title:'Impact & Evidence', cat:'Impact', tab:'impact', url:'impact.html', desc:'78% tree survival rates, 24 million hectares restored, and 92% cost reduction compared to traditional reforestation methods.', links:[{l:'View data',h:'impact.html'},{l:'Research',h:'resources.html'}], img:'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=200&q=70&fit=crop' },
            { title:'24 Million Hectares Restored', cat:'Impact', tab:'impact', url:'impact.html', desc:'Over 24 million hectares of degraded land restored through FMNR practices worldwide, spanning 27 countries.', links:[{l:'Learn more',h:'impact.html'}], img:'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=200&q=70&fit=crop' },
            { title:'Tony Rinaudo', cat:'About', tab:'all', url:'tony-rinaudo.html', desc:'Australian agronomist who developed FMNR in Niger in the 1980s. Right Livelihood Award recipient 2018.', links:[{l:'Full story',h:'tony-rinaudo.html'},{l:'Timeline',h:'tony-rinaudo.html'}], img:'https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=200&q=70&fit=crop' },
            { title:'Interactive Map', cat:'Regions', tab:'regions', url:'index.html#map', desc:'Explore FMNR implementation sites across Africa, Asia, and the Pacific with our interactive MapLibre-powered map.', links:[{l:'Explore map',h:'index.html#map'}], img:'https://images.unsplash.com/photo-1524661135-423995f22d0b?w=200&q=70&fit=crop' },
            { title:'Niger — 5 Million Hectares', cat:'Regions', tab:'regions', url:'index.html#map', desc:'Niger has restored over 5 million hectares through farmer-led FMNR, transforming the Sahel landscape.', links:[{l:'View on map',h:'index.html#map'}], img:'' },
            { title:'Ethiopia — Humbo Region', cat:'Regions', tab:'regions', url:'index.html#map', desc:"Ethiopia's Humbo region — world's first CDM forestry project through FMNR.", links:[{l:'Case study',h:'#'}], img:'' },
            { title:'Training & Resources', cat:'Resources', tab:'resources', url:'resources.html', desc:'Field guides, research papers, and educational resources for FMNR practitioners and community leaders.', links:[{l:'Browse',h:'resources.html'}], img:'https://images.unsplash.com/photo-1488190211105-8b0e65b80b4e?w=200&q=70&fit=crop' },
            { title:'Research Papers', cat:'Resources', tab:'resources', url:'resources.html', desc:'Peer-reviewed studies documenting the environmental, social, and economic impacts of FMNR.', links:[{l:'View papers',h:'resources.html'}], img:'' },
            { title:'78% Tree Survival Rate', cat:'Impact', tab:'impact', url:'impact.html', desc:'FMNR achieves 78% survival vs 20-30% for conventional tree planting.', links:[{l:'Compare',h:'impact.html'}], img:'' },
            { title:'92% Cost Reduction', cat:'Impact', tab:'impact', url:'impact.html', desc:'Just $12 per hectare — 92% cheaper than conventional reforestation.', links:[{l:'Evidence',h:'impact.html'}], img:'' },
            { title:'Faith Based Partners', cat:'Partners', tab:'partners', url:'partner.html', desc:'Churches and faith communities leading restoration through FMNR adoption.', links:[{l:'Learn more',h:'partner.html'}], img:'' },
            { title:'Corporate Partners', cat:'Partners', tab:'partners', url:'partner.html', desc:'ESG, carbon offset, and sustainability programs leveraging FMNR.', links:[{l:'Partner',h:'partner.html#contact'}], img:'' },
            { title:'Donate', cat:'Support', tab:'all', url:'index.html#donate', desc:'Your contribution restores degraded lands and empowers farming communities.', links:[{l:'Donate',h:'index.html#donate'}], img:'' },
            { title:'Data Visualisation', cat:'Impact', tab:'impact', url:'index.html#data-viz', desc:'Animated donut charts and counting stats presenting FMNR impact metrics.', links:[{l:'View',h:'index.html#data-viz'}], img:'' },
            { title:'Decision Making Guide', cat:'Resources', tab:'resources', url:'index.html', desc:'Visual guide to FMNR decision-making: pruning, selection, and management.', links:[{l:'View guide',h:'index.html'}], img:'' }
        ];

        var popularSearches = ['FMNR','impact','Tony Rinaudo','Niger'];
        var popularPages = [
            { label:'Impact & Evidence', href:'impact.html' },
            { label:'Partner With Us', href:'partner.html' },
            { label:'Resources Hub', href:'resources.html' },
            { label:'Tony Rinaudo', href:'tony-rinaudo.html' }
        ];

        var toggle = document.getElementById('search-toggle');
        var panel = document.getElementById('search-panel');
        var backdrop = document.getElementById('search-backdrop');
        var input = document.getElementById('search-input');
        var clearBtn = document.getElementById('clear-btn');
        var dropdown = document.getElementById('search-dropdown');
        var form = document.getElementById('search-form');
        var mainContent = document.getElementById('main-content');
        var resultsPage = document.getElementById('results-page');
        var resultsList = document.getElementById('results-list');
        var resultsCount = document.getElementById('results-count');
        var resultsTabs = document.querySelectorAll('#results-tabs button');
        var activeTab = 'all';
        var isOpen = false;

        function openSearch() {
            isOpen = true;
            panel.classList.add('open');
            backdrop.classList.add('open');
            toggle.classList.add('active');
            setTimeout(function() { input.focus(); }, 100);
            renderDropdown();
        }
        function closeSearch() {
            isOpen = false;
            panel.classList.remove('open');
            backdrop.classList.remove('open');
            toggle.classList.remove('active');
        }

        toggle.addEventListener('click', function() {
            if (isOpen) closeSearch(); else openSearch();
        });
        backdrop.addEventListener('click', closeSearch);
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closeSearch();
        });

        // Clear button
        clearBtn.addEventListener('click', function() { input.value = ''; clearBtn.classList.remove('visible'); renderDropdown(); input.focus(); });

        // Input typing
        input.addEventListener('input', function() {
            clearBtn.classList.toggle('visible', input.value.length > 0);
            renderDropdown();
        });

        // Submit → show results page
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            var q = input.value.trim();
            if (!q) return;
            closeSearch();
            showResults(q);
        });

        function renderDropdown() {
            var q = input.value.trim();
            if (q.length === 0) {
                // Show popular searches + popular pages
                var html = '<div class="search-dropdown-label"><span>Popular searches</span></div>';
                html += '<ul class="search-list">';
                popularSearches.forEach(function(s) {
                    html += '<li><a href="#" data-fill="' + s + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M16 16l5 5"/></svg>' + s + '</a></li>';
                });
                html += '</ul>';
                html += '<div class="search-dropdown-label" style="margin-top:20px;"><span>Popular pages</span></div>';
                html += '<div class="popular-chips">';
                popularPages.forEach(function(p) {
                    html += '<a href="' + p.href + '">' + p.label + '</a>';
                });
                html += '</div>';
                dropdown.innerHTML = html;
                // Wire fill clicks
                dropdown.querySelectorAll('[data-fill]').forEach(function(a) {
                    a.addEventListener('click', function(e) {
                        e.preventDefault();
                        input.value = a.getAttribute('data-fill');
                        clearBtn.classList.add('visible');
                        renderDropdown();
                    });
                });
            } else {
                // Predictive filter
                var lq = q.toLowerCase();
                var matches = searchIndex.filter(function(item) {
                    return item.title.toLowerCase().includes(lq) || item.desc.toLowerCase().includes(lq) || item.cat.toLowerCase().includes(lq);
                }).slice(0, 8);

                if (matches.length === 0) {
                    dropdown.innerHTML = '<p style="padding:20px 0;color:var(--wp--preset--color--contrast-3);font-size:14px;">No suggestions — press Enter to search.</p>';
                    return;
                }
                var html = '';
                matches.forEach(function(item) {
                    html += '<div class="predict-item" data-fill="' + item.title + '"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M16 16l5 5"/></svg><span>' + item.title + '</span><span class="predict-cat">' + item.cat + '</span></div>';
                });
                dropdown.innerHTML = html;
                dropdown.querySelectorAll('.predict-item').forEach(function(el) {
                    el.addEventListener('click', function() {
                        input.value = el.getAttribute('data-fill');
                        clearBtn.classList.add('visible');
                        closeSearch();
                        showResults(input.value);
                    });
                });
            }
        }

        // Results page
        function showResults(query) {
            mainContent.style.display = 'none';
            resultsPage.classList.add('active');
            renderResultsList(query, activeTab);
        }

        function renderResultsList(query, tab) {
            var lq = query.toLowerCase();
            var results = searchIndex.filter(function(item) {
                var matchesTab = tab === 'all' || item.tab === tab;
                var matchesQ = item.title.toLowerCase().includes(lq) || item.desc.toLowerCase().includes(lq) || item.cat.toLowerCase().includes(lq);
                return matchesTab && matchesQ;
            });

            resultsCount.textContent = results.length + ' result' + (results.length !== 1 ? 's' : '') + ' found';

            if (results.length === 0) {
                resultsList.innerHTML = '<div class="no-results"><h3>No results found</h3><p>Try a different search term or filter.</p></div>';
                return;
            }

            var html = '';
            results.forEach(function(item) {
                html += '<div class="result-item"><div class="result-thumb">';
                if (item.img) html += '<img src="' + item.img + '" alt="">';
                else html += '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 12h6M12 9v6M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';
                html += '</div><div class="result-body"><h3>' + item.title + '</h3><p>' + item.desc + '</p><div class="result-links">';
                item.links.forEach(function(link) { html += '<a href="' + link.h + '">' + link.l + '</a>'; });
                html += '</div></div></div>';
            });
            resultsList.innerHTML = html;
        }

        // Tabs
        resultsTabs.forEach(function(btn) {
            btn.addEventListener('click', function() {
                resultsTabs.forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                activeTab = btn.getAttribute('data-tab');
                renderResultsList(input.value, activeTab);
            });
        });

        // Init from URL param
        var params = new URLSearchParams(window.location.search);
        var initQ = params.get('q');
        if (initQ) {
            input.value = initQ;
            clearBtn.classList.add('visible');
            showResults(initQ);
        }
    })();
    </script>
</body>
</html>
