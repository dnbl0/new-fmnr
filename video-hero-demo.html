<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Video Hero Demo — FMNR Components</title>
    <link rel="stylesheet" href="https://use.typekit.net/ajf0nww.css">
    <link href="design-tokens.css" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--font-body);background:#000;min-height:100vh}

        /* VIDEO SECTION */
        .video-section{position:relative;width:100%;height:100vh;overflow:hidden;background:#000}
        .video-section video{width:100%;height:100%;object-fit:cover;display:block}
        .video-controls{position:absolute;bottom:32px;right:32px;display:flex;gap:8px;z-index:10}
        .vc-btn{background:rgba(0,0,0,.28);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.18);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;transition:background .2s}
        .vc-btn:hover{background:rgba(0,0,0,.55)}
        .vc-btn svg{width:15px;height:15px}
    </style>
</head>
<body>
<style id="demo-toolbar-style">
body{padding-top:44px !important;} .site-header{top:44px !important;}
#demo-toolbar{position:fixed;top:0;left:0;right:0;z-index:9999;height:44px;background:#0a0a0a;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;padding:0 20px;gap:0;font-family:'Lato',sans-serif;font-size:12px;box-sizing:border-box;}
#demo-toolbar a{text-decoration:none;}
.dtb-back{color:#0FFBAB;font-weight:700;white-space:nowrap;letter-spacing:.04em;flex-shrink:0;}
.dtb-back:hover{opacity:.7;}
.dtb-title{color:rgba(255,255,255,.45);flex:1;text-align:center;font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 16px;}
.dtb-nav{display:flex;gap:16px;flex-shrink:0;}
.dtb-prev,.dtb-next{color:rgba(255,255,255,.35);font-size:12px;white-space:nowrap;}
.dtb-prev:hover,.dtb-next:hover{color:#fff;}
.dtb-disabled{color:rgba(255,255,255,.12);pointer-events:none;font-size:12px;}
</style>
<div id="demo-toolbar">
  <a class="dtb-back" href="components.html">← Components</a>
  <span class="dtb-title">Video Hero</span>
  <nav class="dtb-nav"><a class="dtb-prev" href="video-demo.html">← Video</a><span class="dtb-disabled">Next →</span></nav>
</div>
    <section class="video-section">
        <video id="hero-video" autoplay muted loop playsinline preload="auto" src="video/forest-fmnr.mp4"></video>
        <div class="video-controls">
            <button class="vc-btn" id="btn-playpause" aria-label="Play/Pause">
                <svg id="icon-pause" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                <svg id="icon-play" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </button>
            <button class="vc-btn" id="btn-mute" aria-label="Toggle sound">
                <svg id="icon-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
                <svg id="icon-unmuted" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
            </button>
        </div>
    </section>
    <script>
    (function(){
        var v=document.getElementById('hero-video');if(!v)return;
        document.getElementById('btn-playpause').addEventListener('click',function(){if(v.paused){v.play();document.getElementById('icon-pause').style.display='';document.getElementById('icon-play').style.display='none';}else{v.pause();document.getElementById('icon-pause').style.display='none';document.getElementById('icon-play').style.display='';}});
        document.getElementById('btn-mute').addEventListener('click',function(){v.muted=!v.muted;document.getElementById('icon-muted').style.display=v.muted?'':'none';document.getElementById('icon-unmuted').style.display=v.muted?'none':'';});
    })();
    </script>
<script src="shared-header.js"></script>
</body>
</html>
