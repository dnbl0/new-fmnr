<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mega Menu Demo — FMNR</title>
    <link rel="stylesheet" href="https://use.typekit.net/ajf0nww.css">
    <link href="design-tokens.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-body); color: var(--color-charcoal); background: #f5f5f7; min-height: 100vh; }

        /* ── Header ── */
        .site-header { background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 16px 48px; position: sticky; top: 0; z-index: 1000; }
        .logo img { height: 33px; display: block; }
        .nav-links { display: flex; gap: 4px; }
        .nav-links a { font-family: var(--font-body); font-weight: 700; font-size: 15px; color: var(--color-charcoal); text-decoration: none; padding: 10px 14px; border-radius: 8px; transition: background 0.15s, color 0.15s; }
        .nav-links a:hover { background: #f5f5f7; }
        .nav-links a.active { color: var(--color-green); background: rgba(7,125,87,0.06); }
        .header-actions { display: flex; align-items: center; gap: 16px; }
        .btn-cta { background: var(--color-green); color: #fff; font-family: var(--font-body); font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 0.04em; padding: 10px 20px; border-radius: 980px; text-decoration: none; transition: background 0.2s; }
        .btn-cta:hover { background: #065e42; }

        /* ── Mega menu shell ── */
        .mega-menu { position: absolute; top: 100%; left: 0; right: 0; background: #fff; box-shadow: 0 32px 80px rgba(0,0,0,0.1); z-index: 999; opacity: 0; visibility: hidden; pointer-events: none; transition: opacity 0.22s cubic-bezier(0.4,0,0.2,1), visibility 0s linear 0.22s; }
        .mega-menu.open { opacity: 1; visibility: visible; pointer-events: auto; transition: opacity 0.22s cubic-bezier(0.4,0,0.2,1), visibility 0s linear 0s; }
        .mega-inner { max-width: 1280px; margin: 0 auto; padding: 28px 48px 36px; }

        /* Eyebrow + view-all row */
        .mega-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 20px; padding: 0 16px; }
        .mega-eyebrow { font-family: var(--font-heading); font-size: 22px; text-transform: uppercase; letter-spacing: 0.04em; color: #1d1d1f; }
        .mega-view-all { font-size: 13px; font-weight: 600; color: #86868b; text-decoration: none; }
        .mega-view-all:hover { color: var(--color-green); }

        /* ── Card grid — always 2 columns ── */
        .mega-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; }

        /* ── Card ── */
        .mega-card { display: flex; align-items: flex-start; gap: 20px; padding: 16px; border-radius: 14px; text-decoration: none; transition: background 0.15s; }
        .mega-card:hover { background: #f5f5f0; }

        /* Icon box — fixed square, flex-centred so icon never stretches */
        .mega-card-icon {
            width: 112px;
            height: 112px;
            flex-shrink: 0;
            background: #f0f0ea;
            border: 1px solid rgba(0,0,0,0.07);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Force the Lucide SVG to a fixed, non-stretching size */
        .mega-card-icon svg {
            width: 44px !important;
            height: 44px !important;
            stroke: var(--color-green);
            stroke-width: 1.5;
            flex-shrink: 0;
        }

        /* Text */
        .mega-card-body { padding-top: 6px; display: flex; flex-direction: column; }
        .mega-card-label {
            font-family: var(--font-heading);
            font-size: 18px;
            text-transform: uppercase;
            color: #1d1d1f;
            line-height: 1.1;
            margin-bottom: 8px;
        }
        .mega-card-desc {
            font-size: 15px;
            font-weight: 600;
            color: rgba(0,0,0,0.48);
            line-height: 1.45;
        }

        /* Backdrop */
        .mega-backdrop { position: fixed; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0); pointer-events: none; z-index: 998; transition: background 0.3s, backdrop-filter 0.3s; }
        .mega-backdrop.open { background: rgba(0,0,0,0.18); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); pointer-events: auto; }
    </style>
</head>
<body>

    <header class="site-header" id="site-header">
        <a href="index.html" class="logo"><img src="fmnr-logo-figma.png" alt="FMNR"></a>
        <nav class="nav-links" id="nav-links">
            <a href="#" data-mega="partner">Partner</a>
            <a href="#" data-mega="learn">Learn</a>
            <a href="#" data-mega="adopt">Adopt</a>
            <a href="#" data-mega="impact">Impact</a>
            <a href="#" data-mega="about">About</a>
        </nav>
        <div class="header-actions">
            <a href="#" class="btn-cta">Get in touch</a>
        </div>

        <div class="mega-backdrop" id="mega-backdrop"></div>
        <div class="mega-menu" id="mega-menu">
            <div class="mega-inner">
                <div class="mega-head">
                    <span class="mega-eyebrow" id="mega-eyebrow"></span>
                    <a href="#" class="mega-view-all" id="mega-view-all"></a>
                </div>
                <div class="mega-grid" id="mega-grid"></div>
            </div>
        </div>
    </header>

    <!-- Lucide icons CDN -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

    <script>
    (function() {
        var megaData = {
            partner: {
                eyebrow: 'Partner with FMNR',
                viewAll: 'View all partnerships →',
                viewAllHref: 'partner.html',
                items: [
                    { icon: 'heart-handshake', label: 'Faith-based Actors',   desc: 'Churches, pastors and faith network leaders',           href: 'partner.html#faith' },
                    { icon: 'network',         label: 'NGOs & Implementers',  desc: 'Development organisations and programme teams',         href: 'partner.html#ngo' },
                    { icon: 'landmark',        label: 'Governments & Policy', desc: 'Policy makers and national programme leaders',          href: 'partner.html#government' },
                    { icon: 'trending-up',     label: 'Funders & Supporters', desc: 'Philanthropists, impact investors and grant-makers',    href: 'partner.html#funders' }
                ]
            },
            learn: {
                eyebrow: 'Learn about FMNR',
                viewAll: 'Explore all resources →',
                viewAllHref: '#',
                items: [
                    { icon: 'sprout',      label: 'FMNR Fundamentals',  desc: 'What it is, how it works and why it matters',         href: '#' },
                    { icon: 'microscope',  label: 'Science & Evidence', desc: 'Research, climate benefits and livelihood outcomes',   href: '#' },
                    { icon: 'globe',       label: 'Global Activity',    desc: 'Maps, flagship countries and movement tracker',        href: '#' }
                ]
            },
            adopt: {
                eyebrow: 'Adopt FMNR',
                viewAll: 'All adoption resources →',
                viewAllHref: '#',
                items: [
                    { icon: 'book-open',   label: 'Getting Started',  desc: 'Step-by-step guides, tools and video library', href: '#' },
                    { icon: 'map-pin',     label: 'Country Examples', desc: 'Niger, Ethiopia, Zambia, Mali and more',        href: '#' },
                    { icon: 'users',       label: 'Connect to Adopt', desc: 'Find local support and share your story',       href: '#' }
                ]
            },
            impact: {
                eyebrow: 'FMNR Impact',
                viewAll: 'View full impact evidence →',
                viewAllHref: 'impact.html',
                items: [
                    { icon: 'library',      label: 'Resource Hub',        desc: 'Stories, research and featured content',         href: '#' },
                    { icon: 'bar-chart-2',  label: 'Impact Dashboard',    desc: 'People reached, hectares and the 1B vision',     href: '#' },
                    { icon: 'mail',         label: 'Reporting & Updates', desc: 'Annual highlights, newsletter and community',    href: '#' }
                ]
            },
            about: {
                eyebrow: 'About FMNR',
                viewAll: 'About FMNR Hub →',
                viewAllHref: '#',
                items: [
                    { icon: 'star',          label: 'Tony Rinaudo',            desc: 'The man who transformed the Sahel',              href: 'tony-rinaudo.html' },
                    { icon: 'building-2',    label: 'FMNR Hub & World Vision', desc: 'Our mission, values and open-source commitment', href: '#' },
                    { icon: 'message-circle',label: 'Connect',                 desc: 'Contact, newsletter and community links',        href: '#' }
                ]
            }
        };

        var menu      = document.getElementById('mega-menu');
        var backdrop  = document.getElementById('mega-backdrop');
        var eyebrowEl = document.getElementById('mega-eyebrow');
        var viewAllEl = document.getElementById('mega-view-all');
        var gridEl    = document.getElementById('mega-grid');
        var activeKey = null;
        var closeTimer = null;

        function renderMenu(key) {
            var d = megaData[key];
            if (!d) return;
            eyebrowEl.textContent = d.eyebrow;
            viewAllEl.textContent = d.viewAll;
            viewAllEl.href = d.viewAllHref;
            gridEl.innerHTML = d.items.map(function(item) {
                return '<a class="mega-card" href="' + item.href + '">'
                     + '<span class="mega-card-icon"><i data-lucide="' + item.icon + '"></i></span>'
                     + '<span class="mega-card-body">'
                     + '<span class="mega-card-label">' + item.label + '</span>'
                     + '<span class="mega-card-desc">' + item.desc + '</span>'
                     + '</span></a>';
            }).join('');
            if (window.lucide) lucide.createIcons();
        }

        function openMenu(key) {
            if (closeTimer) { clearTimeout(closeTimer); closeTimer = null; }
            activeKey = key;
            renderMenu(key);
            menu.classList.add('open');
            backdrop.classList.add('open');
            document.querySelectorAll('.nav-links a').forEach(function(a) {
                a.classList.toggle('active', a.getAttribute('data-mega') === key);
            });
        }

        function closeMenu() {
            activeKey = null;
            menu.classList.remove('open');
            backdrop.classList.remove('open');
            document.querySelectorAll('.nav-links a').forEach(function(a) { a.classList.remove('active'); });
        }

        document.querySelectorAll('.nav-links a[data-mega]').forEach(function(a) {
            a.addEventListener('mouseenter', function() { openMenu(a.getAttribute('data-mega')); });
            a.addEventListener('click', function(e) {
                e.preventDefault();
                if (activeKey === a.getAttribute('data-mega') && menu.classList.contains('open')) closeMenu();
                else openMenu(a.getAttribute('data-mega'));
            });
        });

        backdrop.addEventListener('click', closeMenu);
        menu.addEventListener('mouseleave', function() { closeTimer = setTimeout(closeMenu, 300); });
        menu.addEventListener('mouseenter', function() { if (closeTimer) { clearTimeout(closeTimer); closeTimer = null; } });
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeMenu(); });

        openMenu('partner');
    })();
    </script>
</body>
</html>
