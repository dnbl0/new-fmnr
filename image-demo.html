<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Image — FMNR Components</title>
    <link rel="stylesheet" href="https://use.typekit.net/ajf0nww.css">
    <link href="design-tokens.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-body); background: var(--color-white); min-height: 100vh; padding: 80px 48px; }
        .block-label { display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--color-green); background: rgba(7,125,87,0.08); padding: 5px 12px; border-radius: 6px; margin-bottom: 24px; }
        .block-title { font-family: var(--font-heading); font-size: 28px; text-transform: uppercase; color: var(--color-text-primary); margin-bottom: 8px; line-height: 1.1; }
        .block-desc { font-size: 15px; color: var(--color-text-secondary); line-height: 1.6; margin-bottom: 48px; max-width: 600px; }
        .demo-area { background: var(--color-bg-light); border-radius: 16px; padding: 48px; max-width: 900px; }
        .demo-area + .demo-area { margin-top: 24px; }
        .variant-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-text-muted); margin-bottom: 16px; display: block; }
        .demo-image { width: 100%; max-width: 640px; border-radius: 8px; overflow: hidden; }
        .demo-image img { width: 100%; height: auto; display: block; }
        .demo-image--ken-burns img { animation: kenBurns 12s ease-in-out infinite alternate; }
        @keyframes kenBurns { from { transform: scale(1); } to { transform: scale(1.06); } }
        @media (max-width: 768px) { body { padding: 48px 24px; } .demo-area { padding: 32px 24px; } }
    </style>
</head>
<body>
    <span class="block-label">Core Block</span>
    <h2 class="block-title">Image</h2>
    <p class="block-desc">Responsive image with optional Ken Burns animation class.</p>
    <div class="demo-area">
        <span class="variant-label">Standard</span>
        <div class="demo-image">
            <img src="images/brand/tony-hero.jpg" alt="FMNR landscape" onerror="this.parentElement.style.background='linear-gradient(135deg,#2d5a3d,#0a3d24)';this.parentElement.style.height='300px';this.style.display='none';">
        </div>
    </div>
    <div class="demo-area">
        <span class="variant-label">With Ken Burns animation</span>
        <div class="demo-image demo-image--ken-burns">
            <img src="images/brand/tony-hero.jpg" alt="FMNR landscape animated" onerror="this.parentElement.style.background='linear-gradient(135deg,#2d5a3d,#0a3d24)';this.parentElement.style.height='300px';this.style.display='none';">
        </div>
    </div>
</body>
</html>
