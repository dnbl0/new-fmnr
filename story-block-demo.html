<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Story Block Demo — FMNR Components</title>
    <link rel="stylesheet" href="https://use.typekit.net/ajf0nww.css">
    <link href="design-tokens.css" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--font-body);background:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px}
        .demo-frame{width:100%;max-width:1280px;border-radius:12px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.15)}

        .story-block{position:relative;height:82vh;min-height:540px;overflow:hidden}
        .story-block>img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:60% center}
        .story-scrim{position:absolute;inset:0;background:linear-gradient(100deg,rgba(0,0,0,.78) 30%,rgba(0,0,0,.06) 70%)}
        .story-copy{position:absolute;top:50%;left:0;right:0;transform:translateY(-50%)}
        .story-copy-inner{max-width:1280px;margin:0 auto;padding:0 48px}
        .story-copy-inner blockquote{font-family:var(--font-heading);font-size:clamp(22px,3vw,40px);text-transform:uppercase;color:#fff;line-height:1.1;margin-bottom:24px;max-width:560px}
        .story-copy-inner blockquote em{color:var(--color-teal);font-style:normal}
        .story-copy-inner cite{display:block;font-style:normal;font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.48);margin-bottom:32px}
        .btn-story-outline{display:inline-block;border:1px solid rgba(255,255,255,.35);color:#fff;font-family:var(--font-body);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.08em;padding:11px 24px;border-radius:980px;text-decoration:none;transition:background .2s,border-color .2s}
        .btn-story-outline:hover{background:var(--color-teal);border-color:var(--color-teal);color:#000}
    </style>
</head>
<body>
<style id="demo-toolbar-style">
body{padding-top:44px !important;} .site-header{top:44px !important;}
#demo-toolbar{position:fixed;top:0;left:0;right:0;z-index:9999;height:44px;background:#0a0a0a;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;padding:0 20px;gap:0;font-family:'Lato',sans-serif;font-size:12px;box-sizing:border-box;}
#demo-toolbar a{text-decoration:none;}
.dtb-back{color:#0FFBAB;font-weight:700;white-space:nowrap;letter-spacing:.04em;flex-shrink:0;}
.dtb-back:hover{opacity:.7;}
.dtb-title{color:rgba(255,255,255,.45);flex:1;text-align:center;font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 16px;}
.dtb-nav{display:flex;gap:16px;flex-shrink:0;}
.dtb-prev,.dtb-next{color:rgba(255,255,255,.35);font-size:12px;white-space:nowrap;}
.dtb-prev:hover,.dtb-next:hover{color:#fff;}
.dtb-disabled{color:rgba(255,255,255,.12);pointer-events:none;font-size:12px;}
</style>
<div id="demo-toolbar">
  <a class="dtb-back" href="components.html">← Components</a>
  <span class="dtb-title">Story Block</span>
  <nav class="dtb-nav"><a class="dtb-prev" href="stories-carousel-demo.html">← Stories Carousel</a><a class="dtb-next" href="tag-demo.html">Tag →</a></nav>
</div>
    <div class="demo-frame">
        <div class="story-block">
            <img src="images/brand/WVA5019_WVA-FMNR-Playbook_Master_R4a_Page_19_Image_0001.jpg" alt="Tony Rinaudo">
            <div class="story-scrim"></div>
            <div class="story-copy">
                <div class="story-copy-inner">
                    <blockquote>&#8220;God showed me there was a <em>&#8216;forest&#8217; hidden underground</em>&#8221;</blockquote>
                    <cite>Tony Rinaudo &#8212; Founder of modern FMNR, World Food Prize Laureate</cite>
                    <a href="#" class="btn-story-outline">The FMNR Story &#8250;</a>
                </div>
            </div>
        </div>
    </div>
<script src="shared-header.js"></script>
</body>
</html>
