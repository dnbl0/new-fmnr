<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Image Hero — FMNR Components</title>
    <link rel="stylesheet" href="https://use.typekit.net/ajf0nww.css">
    <link href="design-tokens.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-body); color: var(--color-charcoal); background: #f0f0f0; overflow-x: hidden; }
        .demo-frame { max-width: 1280px; margin: 40px auto; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,.15); }

        .hero { position: relative; height: 100vh; min-height: 640px; overflow: hidden; }
        .hero-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .hero-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.28) 0%, rgba(0,0,0,0.55) 60%, rgba(0,0,0,0.75) 100%); }
        .hero-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 0 96px 80px; max-width: 1400px; }
        .hero-eyebrow { display: inline-block; font-family: var(--font-body); font-size: 12px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-teal); margin-bottom: 20px; }
        .hero-title { font-family: var(--font-heading); font-size: clamp(52px, 7vw, 96px); line-height: 0.95; text-transform: uppercase; color: var(--wp--preset--color--white); max-width: 860px; }
        .hero-title em { color: var(--color-teal); font-style: normal; }
        .hero-scroll { position: absolute; bottom: 36px; right: 96px; display: flex; flex-direction: column; align-items: center; gap: 8px; color: rgba(255,255,255,0.5); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
        .hero-scroll-line { width: 1px; height: 40px; background: rgba(255,255,255,0.3); }

        @media (max-width: 768px) {
            .hero-content { padding: 0 24px 56px; }
            .hero-scroll { display: none; }
        }
    </style>
</head>
<body>
<style id="demo-toolbar-style">
body{padding-top:44px !important;} .site-header{top:44px !important;}
#demo-toolbar{position:fixed;top:0;left:0;right:0;z-index:9999;height:44px;background:#0a0a0a;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;padding:0 20px;gap:0;font-family:'Lato',sans-serif;font-size:12px;box-sizing:border-box;}
#demo-toolbar a{text-decoration:none;}
.dtb-back{color:#0FFBAB;font-weight:700;white-space:nowrap;letter-spacing:.04em;flex-shrink:0;}
.dtb-back:hover{opacity:.7;}
.dtb-title{color:rgba(255,255,255,.45);flex:1;text-align:center;font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 16px;}
.dtb-nav{display:flex;gap:16px;flex-shrink:0;}
.dtb-prev,.dtb-next{color:rgba(255,255,255,.35);font-size:12px;white-space:nowrap;}
.dtb-prev:hover,.dtb-next:hover{color:#fff;}
.dtb-disabled{color:rgba(255,255,255,.12);pointer-events:none;font-size:12px;}
</style>
<div id="demo-toolbar">
  <a class="dtb-back" href="components.html">← Components</a>
  <span class="dtb-title">Image Hero</span>
  <nav class="dtb-nav"><a class="dtb-prev" href="image-demo.html">← Image</a><a class="dtb-next" href="intro-strip-demo.html">Intro Strip →</a></nav>
</div>
    <div class="demo-frame">
        <div class="hero">
            <img class="hero-img" src="images/brand/tony.jpg" alt="Tony Rinaudo in the field in Africa">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <span class="hero-eyebrow">Founder of FMNR</span>
                <h1 class="hero-title">The man who<br><em>refused</em> to give<br>up on the land.</h1>
            </div>
            <div class="hero-scroll">
                <div class="hero-scroll-line"></div>
                <span>Scroll</span>
            </div>
        </div>
    </div>
<script src="shared-header.js"></script>
</body>
</html>
