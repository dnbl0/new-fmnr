<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CTA Band — FMNR Components</title>
    <link rel="stylesheet" href="https://use.typekit.net/ajf0nww.css">
    <link href="design-tokens.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-body); color: var(--color-charcoal); background: #f0f0f0; overflow-x: hidden; }
        .demo-frame { max-width: 1280px; margin: 40px auto; border-radius: 12px; overflow: hidden; box-shadow: 0 8px 40px rgba(0,0,0,.15); }

        .cta-band { background: var(--wp--preset--color--black); padding: 96px; text-align: center; }
        .cta-band h2 { font-family: var(--font-heading); font-size: clamp(36px, 4vw, 56px); text-transform: uppercase; color: var(--wp--preset--color--white); margin-bottom: 20px; line-height: 1; }
        .cta-band p { font-family: var(--font-body); font-size: 18px; line-height: 1.6; color: rgba(255,255,255,0.55); max-width: 560px; margin: 0 auto 40px; }
        .cta-buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
        .btn-primary { background: var(--color-green); color: var(--wp--preset--color--white); font-family: var(--font-body); font-weight: 700; font-size: 15px; text-transform: uppercase; letter-spacing: 0.05em; padding: 14px 32px; border-radius: 980px; text-decoration: none; transition: background 0.2s; }
        .btn-primary:hover { background: var(--wp--preset--color--custom-dark-green-fmnr); color: var(--wp--preset--color--white); }
        .btn-ghost { background: transparent; color: var(--wp--preset--color--white); font-family: var(--font-body); font-weight: 700; font-size: 15px; text-transform: uppercase; letter-spacing: 0.05em; padding: 13px 32px; border-radius: 980px; border: 1px solid rgba(255,255,255,0.25); text-decoration: none; transition: border-color 0.2s, background 0.2s; }
        .btn-ghost:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.5); color: var(--wp--preset--color--white); }

        @media (max-width: 768px) {
            .cta-band { padding: 56px 24px; }
        }
    </style>
</head>
<body>
    <div class="demo-frame">
        <div class="cta-band">
            <h2>Learn about FMNR</h2>
            <p>Tony's life work is a methodology available to everyone. Explore the research, training resources and community stories.</p>
            <div class="cta-buttons">
                <a href="#" class="btn-primary" onclick="event.preventDefault()">Explore Resources</a>
                <a href="#" class="btn-ghost" onclick="event.preventDefault()">See Our Impact</a>
            </div>
        </div>
    </div>
</body>
</html>
