<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Photo Grid Demo — FMNR Components</title>
    <link rel="stylesheet" href="https://use.typekit.net/ajf0nww.css">
    <link href="design-tokens.css" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--font-body);background:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px}
        .demo-frame{width:100%;max-width:1280px;border-radius:12px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.15);background:#fff;padding:48px}

        .photo-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:32px}
        .photo-cell{position:relative;display:flex;flex-direction:column;justify-content:flex-end;overflow:hidden;border-radius:12px;height:440px;transition:box-shadow .25s,transform .25s}
        .photo-cell:hover{box-shadow:0 12px 40px rgba(0,0,0,.18);transform:translateY(-3px)}
        .photo-cell img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .7s ease}
        .photo-cell:hover img{transform:scale(1.05)}
        .photo-caption{position:relative;z-index:2;padding:24px;display:flex;flex-direction:column;gap:6px;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.6) 60%,transparent 100%)}
        .photo-caption strong{display:block;font-family:var(--font-heading);font-size:20px;text-transform:uppercase;line-height:1.1;color:#fff;margin:0}
        @media(max-width:900px){.photo-grid-3{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <div class="demo-frame">
        <div class="photo-grid-3">
            <div class="photo-cell">
                <img src="images/brand/WVA5019_WVA-FMNR-Playbook_Master_R4a_Page_07_Image_0001.jpg" alt="Farmer pruning">
                <div class="photo-caption">
                    <strong>Selective pruning</strong>
                </div>
            </div>
            <div class="photo-cell">
                <img src="images/brand/WVA5019_WVA-FMNR-Playbook_Master_R4a_Page_01_Image_0001.jpg" alt="Women farmers">
                <div class="photo-caption">
                    <strong>Women at the heart of FMNR</strong>
                </div>
            </div>
            <div class="photo-cell">
                <img src="images/brand/WVA5019_WVA-FMNR-Playbook_Master_R4a_Page_05_Image_0001.jpg" alt="Young farmers">
                <div class="photo-caption">
                    <strong>Hands-on learning</strong>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
