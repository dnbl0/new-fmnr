<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FMNR Impact - East Africa</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Leaflet CSS & JS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @media (min-width: 768px) {
      .desktop-scrollbar::-webkit-scrollbar { width: 6px; }
      .desktop-scrollbar::-webkit-scrollbar-track { background: transparent; }
      .desktop-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
      .desktop-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    }
    @media (max-width: 767px) {
      .leaflet-control-attribution { margin-bottom: 260px !important; background: rgba(255,255,255,0.7) !important; }
    }
  </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased m-0 p-0 overflow-hidden select-none md:select-auto">

  <div class="relative h-[100dvh] w-full flex flex-col md:flex-row overflow-hidden">
    
    <!-- Mobile Floating Header -->
    <div class="md:hidden absolute top-4 left-4 z-[1000] pointer-events-auto bg-white/95 backdrop-blur-sm px-5 py-2.5 rounded-full shadow-lg border border-slate-100 flex flex-col">
      <span class="text-[10px] text-emerald-600 font-bold uppercase tracking-wider leading-none mb-1">World Vision</span>
      <span class="text-sm font-extrabold text-slate-900 leading-none">FMNR Scale-Up</span>
    </div>

    <!-- UI Overlay -->
    <div class="pointer-events-none md:pointer-events-auto absolute bottom-0 left-0 w-full z-[1000] md:relative md:w-[40%] lg:w-[35%] md:h-full md:bg-white md:border-r md:border-slate-200 flex flex-col md:shadow-[4px_0_24px_rgba(0,0,0,0.05)]">
      
      <!-- Desktop Header -->
      <div class="hidden md:block p-8 pb-4 shrink-0 pointer-events-auto">
        <span class="text-emerald-600 font-bold tracking-wider text-sm uppercase">World Vision</span>
        <h1 class="text-3xl font-extrabold text-slate-900 mt-1 mb-3">FMNR Scale-Up</h1>
        <p class="text-slate-500 text-sm leading-relaxed">
          Farmer Managed Natural Regeneration is restoring millions of hectares. Select a country to explore impact.
        </p>
      </div>

      <div class="md:hidden absolute bottom-0 left-0 w-full h-[150%] bg-gradient-to-t from-slate-900/20 to-transparent pointer-events-none -z-10"></div>

      <!-- Cards Container -->
      <div id="cards-list" class="pointer-events-auto w-full overflow-x-auto md:overflow-y-auto flex md:flex-col gap-4 md:gap-5 px-4 md:px-8 pb-8 pt-4 md:pt-2 snap-x snap-mandatory no-scrollbar desktop-scrollbar md:pb-12 scroll-smooth">
      </div>
    </div>

    <!-- Map Container -->
    <div class="absolute inset-0 md:static md:flex-1 h-full z-0">
      <div id="map" class="w-full h-full bg-slate-200"></div>
    </div>

  </div>

  <script>
    const fmnrData = [
      { id: 'ethiopia', name: 'Ethiopia', lat: 9.145, lng: 40.4897, total: '4.6M', direct: '700K', indirect: '3.9M', desc: 'Ethiopia aims to restore 15 million hectares nationally, focusing on extensive degraded land.' },
      { id: 'kenya', name: 'Kenya', lat: 0.0236, lng: 37.9062, total: '4.5M', direct: '744K', indirect: '3.75M', desc: 'Kenya has committed to bringing 5.1 million hectares into restoration for climate strategy.' },
      { id: 'uganda', name: 'Uganda', lat: 1.3733, lng: 32.2903, total: '2.28M', direct: '571K', indirect: '1.71M', desc: 'Uganda is targeting the restoration of 2.5 million hectares to build resilience for farmers.' },
      { id: 'zambia', name: 'Zambia', lat: -13.1339, lng: 27.8493, total: '2.0M', direct: '600K', indirect: '1.4M', desc: 'Zambia plans to restore over 3 million hectares by empowering communities.' }
    ];

    const map = L.map('map', { scrollWheelZoom: false, zoomControl: false });
    L.control.zoom({ position: 'topright' }).addTo(map);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OSM &copy; CARTO',
      subdomains: 'abcd',
      maxZoom: 20
    }).addTo(map);

    setTimeout(() => { map.invalidateSize(); }, 100);

    const markers = {};
    const cardsList = document.getElementById('cards-list');

    const createLeafIcon = (color, scale = 1) => {
      return L.divIcon({
        className: 'custom-icon',
        html: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="${color}" style="width:${32*scale}px; height:${32*scale}px;" class="drop-shadow-md transform -translate-y-1/2 -translate-x-1/2 transition-all duration-300">
                 <path fill-rule="evenodd" d="M11.54 22.351l.07.04.028.016a.76.76 0 00.723 0l.028-.015.071-.041a16.975 16.975 0 001.144-.742 19.58 19.58 0 002.683-2.282c1.944-1.99 3.963-4.98 3.963-8.827a8.25 8.25 0 00-16.5 0c0 3.846 2.02 6.837 3.963 8.827a19.58 19.58 0 002.682 2.282 16.975 16.975 0 001.145.742zM12 13.5a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd" />
               </svg>`,
        iconSize: [32*scale, 32*scale],
        iconAnchor: [16*scale, 32*scale],
        popupAnchor: [0, -32*scale]
      });
    };

    const defaultIcon = createLeafIcon('#10b981');
    const activeIcon = createLeafIcon('#047857', 1.25);
    const mapBounds = [];

    fmnrData.forEach((data) => {
      const marker = L.marker([data.lat, data.lng], { icon: defaultIcon }).addTo(map);
      mapBounds.push([data.lat, data.lng]);
      
      const popupContent = `
        <div class="px-1 py-0.5 font-sans">
          <h4 class="font-bold text-base text-slate-800 mb-0.5">${data.name}</h4>
          <p class="text-emerald-700 font-semibold text-sm m-0">${data.total} ha</p>
        </div>
      `;
      marker.bindPopup(popupContent, { closeButton: false, offset: [0, -5] });
      markers[data.id] = marker;

      const card = document.createElement('div');
      card.id = `card-${data.id}`;
      card.className = `group bg-white rounded-2xl p-5 border-2 border-slate-100 shadow-lg md:shadow-sm transition-all duration-300 cursor-pointer hover:border-emerald-200 
                        min-w-[85vw] max-w-[85vw] md:min-w-0 md:max-w-none snap-center shrink-0`;
      
      card.innerHTML = `
        <div class="flex justify-between items-start mb-2 md:mb-3">
          <h3 class="text-xl md:text-2xl font-bold text-slate-800 group-hover:text-emerald-700 transition-colors">${data.name}</h3>
          <div class="bg-emerald-50 md:bg-emerald-100 text-emerald-800 text-[10px] md:text-xs font-bold px-2 md:px-3 py-1 rounded-full flex items-center">
            <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M5.293 9.707a1 1 0 010-1.414l4-4a1 1 0 011.414 0l4 4a1 1 0 01-1.414 1.414L11 7.414V15a1 1 0 11-2 0V7.414L6.707 9.707a1 1 0 01-1.414 0z" clip-rule="evenodd"></path></svg>
            ${data.total} ha
          </div>
        </div>
        <p class="text-slate-500 text-xs md:text-sm mb-4 leading-relaxed line-clamp-2 md:line-clamp-none">${data.desc}</p>
        <div class="grid grid-cols-2 gap-2 md:gap-3">
          <div class="bg-slate-50 rounded-xl p-2.5 border border-slate-100">
            <span class="block text-[9px] md:text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">Direct</span>
            <span class="block text-base md:text-lg font-bold text-slate-700">${data.direct}</span>
          </div>
          <div class="bg-slate-50 rounded-xl p-2.5 border border-slate-100">
            <span class="block text-[9px] md:text-[10px] text-slate-400 font-bold uppercase tracking-wider mb-0.5">Indirect</span>
            <span class="block text-base md:text-lg font-bold text-slate-700">${data.indirect}</span>
          </div>
        </div>
      `;

      card.addEventListener('click', () => activateCountry(data.id));
      marker.on('click', () => {
        activateCountry(data.id);
        card.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      });

      cardsList.appendChild(card);
    });

    const isMobileInit = window.innerWidth < 768;
    map.fitBounds(mapBounds, {
      paddingTopLeft: [50, isMobileInit ? 80 : 50],
      paddingBottomRight: [50, isMobileInit ? 320 : 50]
    });

    function activateCountry(id) {
      fmnrData.forEach(d => {
        const c = document.getElementById(`card-${d.id}`);
        c.classList.remove('border-emerald-500', 'ring-2', 'ring-emerald-100');
        c.classList.add('border-slate-100');
        markers[d.id].setIcon(defaultIcon);
      });

      const activeCard = document.getElementById(`card-${id}`);
      activeCard.classList.remove('border-slate-100');
      activeCard.classList.add('border-emerald-500', 'ring-2', 'ring-emerald-100');

      const activeData = fmnrData.find(d => d.id === id);
      const activeMarker = markers[id];
      activeMarker.setIcon(activeIcon);
      activeMarker.openPopup();

      const isMobile = window.innerWidth < 768;
      const latOffset = isMobile ? -1.5 : 0;
      map.flyTo([activeData.lat - latOffset, activeData.lng], 7, { animate: true, duration: 1.2 });
    }
  </script>
</body>
</html>
