<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Twin Panels Demo — FMNR Components</title>
    <link rel="stylesheet" href="https://use.typekit.net/ajf0nww.css">
    <link href="design-tokens.css" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--font-body);background:#f0f0f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px}
        .demo-frame{width:100%;max-width:1280px;border-radius:12px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.15);background:#fff;padding:48px}

        .twin-panels{display:grid;grid-template-columns:1fr 1fr;gap:32px}
        .twin-panel{position:relative;display:flex;flex-direction:column;justify-content:flex-end;height:440px;overflow:hidden;border-radius:12px;transition:box-shadow .25s,transform .25s}
        .twin-panel:hover{box-shadow:0 12px 40px rgba(0,0,0,.18);transform:translateY(-3px)}
        .twin-panel>img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transition:transform .7s ease}
        .twin-panel:hover>img{transform:scale(1.05)}
        .twin-copy{position:relative;z-index:2;padding:24px;display:flex;flex-direction:column;gap:6px;background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.6) 60%,transparent 100%)}
        .twin-heading{font-family:var(--font-heading);font-size:20px;text-transform:uppercase;color:#fff;line-height:1.1;margin:0}
        .twin-link{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:#fff;text-decoration:none;border:none;padding:0;margin-top:6px}
        .twin-link:hover{border:none}
        @media(max-width:900px){.twin-panels{grid-template-columns:1fr}}
    </style>
</head>
<body>
<style id="demo-toolbar-style">
body{padding-top:44px !important;} .site-header{top:44px !important;}
#demo-toolbar{position:fixed;top:0;left:0;right:0;z-index:9999;height:44px;background:#0a0a0a;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;padding:0 20px;gap:0;font-family:'Lato',sans-serif;font-size:12px;box-sizing:border-box;}
#demo-toolbar a{text-decoration:none;}
.dtb-back{color:#0FFBAB;font-weight:700;white-space:nowrap;letter-spacing:.04em;flex-shrink:0;}
.dtb-back:hover{opacity:.7;}
.dtb-title{color:rgba(255,255,255,.45);flex:1;text-align:center;font-weight:700;text-transform:uppercase;letter-spacing:.12em;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 16px;}
.dtb-nav{display:flex;gap:16px;flex-shrink:0;}
.dtb-prev,.dtb-next{color:rgba(255,255,255,.35);font-size:12px;white-space:nowrap;}
.dtb-prev:hover,.dtb-next:hover{color:#fff;}
.dtb-disabled{color:rgba(255,255,255,.12);pointer-events:none;font-size:12px;}
</style>
<div id="demo-toolbar">
  <a class="dtb-back" href="components.html">← Components</a>
  <span class="dtb-title">Twin Panels</span>
  <nav class="dtb-nav"><a class="dtb-prev" href="tony-blocks-demo.html">← Tony Blocks</a><a class="dtb-next" href="video-demo.html">Video →</a></nav>
</div>
    <div class="demo-frame">
        <div class="twin-panels">
            <div class="twin-panel">
                <img src="images/brand/WVA5019_WVA-FMNR-Playbook_Master_R4a_Page_04_Image_0001.jpg" alt="FMNR training">
                <div class="twin-copy">
                    <p class="twin-heading">Farmers teaching farmers</p>
                    <a href="#" class="twin-link">Explore adoption resources &#8250;</a>

                    <p class="twin-heading">Whole communities transformed</p>
                    <a href="#" class="twin-link">See the impact &#8250;</a>
                </div>
            </div>
        </div>
    </div>
<script src="shared-header.js"></script>

</html>
